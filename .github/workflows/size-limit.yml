name: "Bundle size enforcement"

on:
  pull_request:
    paths:
      - "**"
  push:
    branches:
      - main

jobs:
  size-limit:
    name: Size budget check
    runs-on: ubuntu-latest
    env:
      # Required by next.config.js in production builds; placeholder for CI only.
      EMBED_ALLOWLIST: https://example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build (force webpack)
        run: npm run build -- --webpack

      - name: Run size-limit
        run: npm run size-limit
