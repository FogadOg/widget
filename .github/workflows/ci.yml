name: Widget App Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      # Required by next.config.js in production builds to avoid open framing.
      # CI uses a non-production placeholder origin for validation builds.
      EMBED_ALLOWLIST: https://example.com

    steps:
    - uses: actions/checkout@v4
      with:
        # ensure full history so tools that need commit ranges (gitleaks) work
        fetch-depth: 0
        fetch-tags: true
        persist-credentials: true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run locale checks (warnings only)
      run: python3 ./scripts/check_locale_issues.py && python3 ./scripts/ci_warn_if_empty.py || true

    - name: Run linter
      run: npm run lint

    - name: Run typecheck
      run: npm run typecheck

    - name: Build
      run: npm run build

    - name: Run tests with coverage
      run: npm test -- --coverage

    - name: Security audit
      run: npm audit --audit-level=high || true

    # ── Security gates ────────────────────────────────────────────────────
    - name: Check for secret leaks (Gitleaks)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: false

    - name: Dependency vulnerability scan (npm audit)
      run: npm audit --audit-level=critical

    - name: Verify SRI manifest was generated
      run: |
        if [ ! -f sri-manifest.json ]; then
          echo "ERROR: sri-manifest.json not found. Run 'npm run build:sri' after the build."
          exit 1
        fi
        ENTRIES=$(node -e "const m = require('./sri-manifest.json'); console.log(Object.keys(m).length)")
        if [ "$ENTRIES" -eq "0" ]; then
          echo "ERROR: sri-manifest.json is empty — no SRI hashes were generated."
          exit 1
        fi
        echo "SRI manifest OK: $ENTRIES entries"

    - name: Verify CSP header is present on SSR pages
      run: |
        node -e "
          const src = require('fs').readFileSync('next.config.js', 'utf8');
          if (!src.includes('Strict-Transport-Security')) {
            console.error('HSTS header missing from next.config.js');
            process.exit(1);
          }
          console.log('next.config.js security header check passed');
        " || true

    # ── Size / bundle ─────────────────────────────────────────────────────
    - name: Check bundle size budgets
      run: npm run ci:size-limit || true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: always()
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info
        flags: widget-app
        name: widget-app-coverage
      continue-on-error: true
