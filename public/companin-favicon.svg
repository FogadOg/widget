<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Companin">
  <!-- Favicon-optimised: 3 bolder bars so it stays legible at 16px, where the
       full 5-bar mark turns to mush. Rasterise this one to the PNG favicons. -->
  <defs>
    <linearGradient id="companinFav" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect x="12" y="24" width="12" height="16" rx="6" fill="url(#companinFav)"/>
  <rect x="26" y="12" width="12" height="40" rx="6" fill="url(#companinFav)"/>
  <rect x="40" y="24" width="12" height="16" rx="6" fill="url(#companinFav)"/>
</svg>
