<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Companin">
  <!-- Filled circular badge: use as the default widget avatar and as the
       floating launcher button when the org has no custom logo. Also works
       as the app-icon / OG source. -->
  <defs>
    <linearGradient id="companinBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="58" fill="url(#companinBadge)"/>
  <g fill="#ffffff">
    <rect x="26" y="52" width="10" height="16" rx="5"/>
    <rect x="42" y="42" width="10" height="36" rx="5"/>
    <rect x="55" y="34" width="10" height="52" rx="5"/>
    <rect x="68" y="42" width="10" height="36" rx="5"/>
    <rect x="84" y="52" width="10" height="16" rx="5"/>
  </g>
</svg>
